name: Deploy ppc

# Runs on the self-hosted runner on the openclaw box. Triggered by a
# repository_dispatch from bpavlo/ppc (after its CI passes on main), or
# manually. Bumps the ppc flake input, rebuilds the system, commits the
# flake.lock bump, and verifies the service.

on:
  repository_dispatch:
    types: [ppc-deploy]
  workflow_dispatch:

concurrency: deploy-openclaw

permissions:
  contents: write

jobs:
  deploy:
    runs-on: [self-hosted, openclaw]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump ppc flake input
        run: nix flake update ppc

      - name: Rebuild system
        run: sudo /run/current-system/sw/bin/nixos-rebuild switch --flake .#openclaw

      - name: Commit flake.lock bump
        run: |
          if ! git diff --quiet flake.lock; then
            git config user.name "ppc-deploy[bot]"
            git config user.email "ppc-deploy@users.noreply.github.com"
            git add flake.lock
            git commit -m "deploy: bump ppc to ${{ github.event.client_payload.sha || 'manual' }}"
            git push origin HEAD:main
          else
            echo "flake.lock unchanged — nothing to commit"
          fi

      - name: Verify ppc service
        run: |
          systemctl is-active --quiet ppc
          if journalctl -u ppc --since "2 min ago" --no-pager | grep -qi "TelegramConflictError"; then
            echo "::error::TelegramConflictError in ppc journal — duplicate poller"
            exit 1
          fi
